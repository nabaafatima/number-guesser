<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>number guesser</title>
    </head>
    <body>
        <script src="script.js" defer></script>
        
        <div id="layout">
            <h1 class="text2">tries:</h1>
            <textarea readonly id="tries"></textarea>
            <h1 id="text1">guesss the number</h1>
            <input type="number" id="guess" placeholder="your guess?">
            <button id="start">START</button>
            <div  id="hint" style="border: 1px solid black; padding: 10px;"></div>
            
        </div>
    </body>
</html>
