<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>number guesser</title>
    </head>
    <body>
        <script src="script.js" defer></script>
        
        <div id="layout">
            <h1 class="text2">tries:</h1>
            <textarea readonly id="tries"></textarea>
            <h1 id="text1">guesss the number</h1>
            <input type="number" id="guess" placeholder="your guess?">
            <button id="start">START</button>
            <div  id="hint" style="border: 1px solid blueviolet; padding: 10px;"></div>
            
        </div>
        <div class="rules">
            <h1>RULES:</h1>
            <h2>1. Only 7 tries will be given. </h2>
            <h2>After that the game will choose a new number</h2>
            <h2>2. The number will be between 1 and 100</h2>
            <h2>3. Theres no score</h2>
            <h2>4. After the nummber is guessed</h2>
            <h2>new number will be choosed. </h2>
        </div>
    </body>
</html>
